apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-actions-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: github-actions-demo
  template:
    metadata:
      labels:
        app: github-actions-demo
    spec:
      containers:
      - name: github-actions-demo
        image: 943086490311.dkr.ecr.ap-south-1.amazonaws.com/github-actions-demo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80